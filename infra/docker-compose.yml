services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      UPLOADS_DIR: /app/uploads
      PUBLIC_API_URL: ${PUBLIC_API_URL:-https://api.ticketall.eu}
      MAIL_TRANSPORT: ${MAIL_TRANSPORT:-mailpit}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@ticketall.eu}
      APP_BASE_URL: ${APP_BASE_URL:-https://ticketall.eu}
      ADMIN_BASE_URL: ${ADMIN_BASE_URL:-https://admin.ticketall.eu}
      QR_HMAC_SECRET: ${QR_HMAC_SECRET:-${JWT_SECRET}}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Stripe Sandbox (gateway STRIPE_SANDBOX) – druhá sada kľúčov, prepínateľná v admin/payment-gateways.
      STRIPE_SECRET_KEY_TEST: ${STRIPE_SECRET_KEY_TEST:-}
      STRIPE_WEBHOOK_SECRET_TEST: ${STRIPE_WEBHOOK_SECRET_TEST:-}
      ORDER_EXPIRY_MINUTES: ${ORDER_EXPIRY_MINUTES:-30}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      # AI asistent – Claude (default). OPENAI_* ostáva ako fallback (ASSISTANT_PROVIDER=openai).
      ASSISTANT_PROVIDER: ${ASSISTANT_PROVIDER:-anthropic}
      ASSISTANT_MODEL: ${ASSISTANT_MODEL:-claude-sonnet-5}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # AI konverzácie – Telegram notifikácie (token je secret; chatId/enabled v DB).
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # Helpdesk IMAP poller (krok 29). Bez HELPDESK_ENABLED=true sa vôbec nespustí.
      HELPDESK_ENABLED: ${HELPDESK_ENABLED:-false}
      HELPDESK_IMAP_HOST: ${HELPDESK_IMAP_HOST:-}
      HELPDESK_IMAP_PORT: ${HELPDESK_IMAP_PORT:-993}
      HELPDESK_IMAP_USER: ${HELPDESK_IMAP_USER:-}
      HELPDESK_IMAP_PASS: ${HELPDESK_IMAP_PASS:-}
      HELPDESK_IMAP_POLL_SEC: ${HELPDESK_IMAP_POLL_SEC:-60}
      # Fakturačný systém. Údaje DODÁVATEĽA na faktúre už NIE sú v ENV (krok 30) –
      # jediný zdroj je tabuľka PlatformInfo, edituje sa v /admin/platform-info.
      # Krok 13c: true → cron po vytvorení draftu aj finalizuje + odošle. Default false (manuálne).
      BILLING_AUTO_SEND: ${BILLING_AUTO_SEND:-false}
      # eKasa fiškalizácia POS (krok eKasa-F1): true → POS predaj registruje doklad na eKase. Default false.
      EKASA_ENABLED: ${EKASA_ENABLED:-false}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    expose:
      - "3001"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.ticketall.eu}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.ticketall.eu}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      - backend
    networks:
      - internal
    expose:
      - "3000"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ALLOW_INSECURE: true
    networks:
      - internal
    expose:
      - "1025"
      - "8025"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  uploads_data:

networks:
  internal:
    driver: bridge
